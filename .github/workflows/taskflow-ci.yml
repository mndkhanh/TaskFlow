name: taskflow-ci

on:
  push:
    branches: ["**"]
    paths:
      - "www/taskflow/**"
      - ".github/workflows/taskflow-ci.yml"
  pull_request:
    paths:
      - "www/taskflow/**"
      - ".github/workflows/taskflow-ci.yml"

defaults:
  run:
    working-directory: www/taskflow

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: www/taskflow/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
