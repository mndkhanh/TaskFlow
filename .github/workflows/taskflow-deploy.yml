name: taskflow-deploy

on:
  push:
    branches: [main]
    paths:
      - "www/taskflow/**"
      - ".github/workflows/taskflow-deploy.yml"
  workflow_dispatch:

concurrency:
  group: taskflow-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: www/taskflow/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: www/taskflow

      - name: Build
        run: npm run build
        working-directory: www/taskflow
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy www/taskflow/dist --project-name=srt-taskflow --branch=main
