document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

     { id:'infra', name:'Infrastructure', gradient:'linear-gradient(135deg,#334155,#64748b)', color:'#334155', cards:8, avatars:['marcus','diego'], archived:true },\n      ],\n      lists: [\n        { id:'backlog', title:'Backlog', cards:[\n          { id:CID(), title:'Research competitor onboarding flows', labels:[L.research], assignees:['priya'], due:null, checklist:cl([{t:'Trello',d:false},{t:'Asana',d:false},{t:'Notion',d:false},{t:'Height',d:false}]), comments:[], attachments:[], description:'Audit how leading tools handle first-run experience. Capture screenshots and note friction points for our own onboarding.' },\n          { id:CID(), title:'Define analytics event taxonomy', labels:[L.backend], assignees:['sam'], due:null, checklist:[], comments:[], attachments:[], description:'Standardize event names and properties before instrumentation. Draft a spec doc for review.' },\n          { id:CID(), title:'Dark mode design spec', labels:[L.design], assignees:['priya'], due:{label:'Jul 21', soon:false}, checklist:cl([{t:'Color tokens',d:true},{t:'Elevation',d:true},{t:'Charts',d:false},{t:'Illustrations',d:false},{t:'QA pass',d:false},{t:'Handoff',d:false}]), comments:[], attachments:[], description:'Full dark theme token set covering surfaces, text and semantic colors.' },\n        ]},\n        { id:'todo', title:'To Do', cards:[\n          { id:CID(), title:'Redesign empty states across the app', labels:[L.design], assignees:['ava'], due:{label:'Jul 12', soon:true}, checklist:[], comments:[{author:'Ava Chen',initials:'AC',color:'#0c55a3',text:'Starting with the boards empty state first.',time:'2h ago'}], attachments:[], description:'Empty states currently feel unfinished. Add illustrations and a clear primary action to each.' },\n          { id:CID(), title:'Set up push notification service', labels:[L.backend], assignees:['marcus'], due:null, checklist:cl([{t:'FCM setup',d:false},{t:'Token storage',d:false},{t:'Delivery test',d:false}]), comments:[], attachments:[], description:'Wire up cross-platform push via FCM. Store device tokens against profiles.' },\n          { id:CID(), title:'Accessibility audit (WCAG 2.2 AA)', labels:[L.research,L.urgent], assignees:['sam'], due:{label:'Jul 15', soon:true}, checklist:[], comments:[], attachments:[], description:'Run contrast, focus-order and screen-reader checks. File issues for anything below AA.' },\n        ]},\n        { id:'progress', title:'In Progress', cards:[\n          { id:CID(), title:'Build card drag-and-drop interactions', labels:[L.feature], assignees:['ava','diego'], due:{label:'Jul 10', soon:true}, checklist:cl([{t:'Drag within a list',d:true},{t:'Drag between lists',d:true},{t:'Drop placeholder',d:true},{t:'Touch support',d:false},{t:'Keyboard reorder',d:false}]), comments:[\n            {author:'Diego Santos',initials:'DS',color:'#0f9d58',text:'Cross-list drop is working smoothly now.',time:'5h ago'},\n            {author:'Ava Chen',initials:'AC',color:'#0c55a3',text:'Nice — the placeholder line makes it much clearer.',time:'3h ago'},\n          ], attachments:[{name:'dnd-demo.mp4', ext:'MP4', size:'4.2 MB'}], description:'Smooth reordering within a list and moving cards between lists, with a live drop indicator. Real-time sync to other viewers follows once this lands.' },\n          { id:CID(), title:'Fix crash on image upload over 5MB', labels:[L.bug,L.urgent], assignees:['marcus'], due:{label:'Jul 9', soon:true}, checklist:[], comments:[{author:'Marcus Lee',initials:'ML',color:'#e61c23',text:'Reproduced — it is the client-side resize step.',time:'1h ago'}], attachments:[], description:'App crashes when uploading large images to Supabase Storage. Add client-side compression and size guard.' },\n          { id:CID(), title:'Workspace member invites via email', labels:[L.feature], assignees:['priya'], due:null, checklist:cl([{t:'Invite email template',d:true},{t:'Accept flow',d:false},{t:'Role assignment',d:false}]), comments:[], attachments:[], description:'Owners can invite members by email and assign a role on acceptance.' },\n        ]},\n        { id:'review', title:'Review', cards:[\n          { id:CID(), title:'Real-time sync for board updates', labels:[L.backend,L.feature], assignees:['diego'], due:null, checklist:[], comments:[\n            {author:'Ava Chen',initials:'AC',color:'#0c55a3',text:'Tested with two windows — instant. 🎉',time:'6h ago'},\n          ], attachments:[], description:'Broadcast card moves over Supabase Realtime channels so all viewers see changes without refresh.' },\n          { id:CID(), title:'Onboarding tooltip copy', labels:[L.design], assignees:['sam'], due:null, checklist:[], comments:[], attachments:[], description:'Short, friendly copy for the four first-run tooltips.' },\n        ]},\n        { id:'done', title:'Done', cards:[\n          { id:CID(), title:'Auth: Google OAuth + email/password', labels:[L.backend], assignees:['marcus'], due:null, checklist:[], comments:[], attachments:[], description:'Supabase Auth wired up for both providers with automatic personal workspace provisioning.' },\n          { id:CID(), title:'Profile avatar upload', labels:[L.feature], assignees:['priya'], due:null, checklist:[], comments:[], attachments:[], description:'Users can upload and crop an avatar stored in Supabase Storage.' },\n          { id:CID(), title:'Board background picker', labels:[L.design], assignees:['ava'], due:null, checklist:[], comments:[], attachments:[{name:'gradients.fig', ext:'FIG', size:'880 KB'},{name:'unsplash-set.zip', ext:'ZIP', size:'12 MB'}], description:'Color and Unsplash image backgrounds selectable per board.' },\n          { id:CID(), title:'Set up CI pipeline', labels:[L.backend], assignees:['diego'], due:null, checklist:[], comments:[], attachments:[], description:'GitHub Actions running lint, tests and preview deploys on every PR.' },\n        ]},\n      ],\n    };\n  }\n\n  THEMES = {\n    light: { '--bg':'#f5f6f8','--surface':'#ffffff','--surface-2':'#ebedf0','--surface-3':'#e1e4e8','--border':'#e4e7eb','--border-2':'#d3d8de','--text':'#141924','--text-2':'#586171','--text-3':'#8a94a2','--primary':'#0c55a3','--primary-2':'#0a4380','--primary-soft':'#e8f0f9','--danger':'#e61c23','--danger-2':'#c4141a','--danger-soft':'#fdeaeb','--shadow':'0 1px 3px rgba(16,24,40,0.08),0 1px 2px rgba(16,24,40,0.04)','--shadow-lg':'0 12px 40px rgba(16,24,40,0.16)' },\n    dark:  { '--bg':'#0e1116','--surface':'#161b22','--surface-2':'#1d2530','--surface-3':'#28303c','--border':'#2a313c','--border-2':'#3a4250','--text':'#e6e9ee','--text-2':'#9aa4b2','--text-3':'#6b7482','--primary':'#4f97e0','--primary-2':'#3d7fc4','--primary-soft':'#152a3f','--danger':'#f0565c','--danger-2':'#e61c23','--danger-soft':'#2a1418','--shadow':'0 1px 3px rgba(0,0,0,0.4)','--shadow-lg':'0 16px 48px rgba(0,0,0,0.6)' },\n  };\n\n  componentDidMount() { this.applyTheme(this.state.theme); }\n\n  applyTheme(theme) {\n    const p = this.THEMES[theme]; if (!this.rootEl || !p) return;\n    Object.entries(p).forEach(([k,v]) => this.rootEl.style.setProperty(k, v));\n  }\n\n  toggleTheme = () => {\n    const theme = this.state.theme === 'light' ? 'dark' : 'light';\n    this.setState({ theme });\n    this.applyTheme(theme);\n  };\n\n  // ---- drag ----\n  cardDragStart = (e, id) => {\n    this.setState({ dragCardId: id });\n    try { e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/plain', id); } catch (_) {}\n  };\n  cardDragOver = (e, cardId, listId) => {\n    e.preventDefault(); e.stopPropagation();\n    if (this.state.dragCardId === cardId) return;\n    const r = e.currentTarget.getBoundingClientRect();\n    const before = (e.clientY - r.top) < r.height / 2;\n    const dt = this.state.dragTarget;\n    if (!dt || dt.cardId !== cardId || dt.before !== before || dt.listId !== listId)\n      this.setState({ dragTarget: { listId, cardId, before } });\n  };\n  listDragOver = (e, listId) => {\n    e.preventDefault();\n    const dt = this.state.dragTarget;\n    if (!dt || dt.listId !== listId || dt.cardId !== null)\n      this.setState({ dragTarget: { listId, cardId: null, before: false } });\n  };\n  listDrop = (e, listId) => { e.preventDefault(); this.moveCard(listId); };\n  cardDragEnd = () => this.setState({ dragCardId: null, dragTarget: null });\n\n  moveCard(targetListId) {\n    const { dragCardId, dragTarget } = this.state;\n    if (!dragCardId) { this.setState({ dragTarget: null }); return; }\n    const lists = this.state.lists.map(l => ({ ...l, cards: [...l.cards] }));\n    let moved = null;\n    for (const l of lists) { const i = l.cards.findIndex(c => c.id === dragCardId); if (i >= 0) { moved = l.cards.splice(i, 1)[0]; break; } }\n    if (!moved) { this.setState({ dragCardId: null, dragTarget: null }); return; }\n    const tl = lists.find(l => l.id === targetListId);\n    if (!tl) { this.setState({ dragCardId: null, dragTarget: null }); return; }\n    if (dragTarget && dragTarget.cardId) {\n      let idx = tl.cards.findIndex(c => c.id === dragTarget.cardId);\n      if (idx < 0) idx = tl.cards.length; else if (!dragTarget.before) idx += 1;\n      tl.cards.splice(idx, 0, moved);\n    } else { tl.cards.push(moved); }\n    this.setState({ lists, dragCardId: null, dragTarget: null });\n  }\n\n  // ---- composer ----\n  openComposer = (listId) => this.setState({ composerListId: listId, composerText: '' });\n  setComposerText = (e) => this.setState({ composerText: e.target.value });\n  cancelComposer = () => this.setState({ composerListId: null, composerText: '' });\n  submitComposer = () => {\n    const text = this.state.composerText.trim(); const listId = this.state.composerListId;\n    if (!text || !listId) { this.cancelComposer(); return; }\n    const lists = this.state.lists.map(l => l.id === listId\n      ? { ...l, cards: [...l.cards, { id:'c'+Date.now(), title:text, labels:[], assignees:[], due:null, checklist:[], comments:[], attachments:[], description:'' }] }\n      : l);\n    this.setState({ lists, composerText: '' });\n  };\n  composerKey = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); this.submitComposer(); } if (e.key === 'Escape') this.cancelComposer(); };\n\n  // ---- modal ----\n  openCard = (id) => this.setState({ openCardId: id, commentDraft: '' });\n  closeCard = () => this.setState({ openCardId: null, commentDraft: '' });\n  stop = (e) => e.stopPropagation();\n  setCommentDraft = (e) => this.setState({ commentDraft: e.target.value });\n  submitComment = () => {\n    const text = this.state.commentDraft.trim(); const id = this.state.openCardId;\n    if (!text || !id) return;\n    const lists = this.state.lists.map(l => ({ ...l, cards: l.cards.map(c => c.id === id\n      ? { ...c, comments: [{ author:'You', initials:'YO', color:'var(--primary)', text, time:'just now' }, ...c.comments] } : c) }));\n    this.setState({ lists, commentDraft: '' });\n  };\n  commentKey = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); this.submitComment(); } };\n  toggleChecklist = (cardId, itemId) => {\n    const lists = this.state.lists.map(l => ({ ...l, cards: l.cards.map(c => c.id === cardId\n      ? { ...c, checklist: c.checklist.map(it => it.id === itemId ? { ...it, done: !it.done } : it) } : c) }));\n    this.setState({ lists });\n  };\n\n  // ---- nav ----\n  doLogin = () => this.setState({ screen: 'dashboard' });\n  logout = () => this.setState({ screen: 'login' });\n  logoutToDash = () => this.setState({ screen: 'dashboard', openCardId: null });\n  openBoard = (id) => this.setState({ screen: 'board', activeBoard: id });\n  selectWs = (id) => this.setState({ activeWs: id });\n\n  renderVals() {\n    const s = this.state;\n    const memberMap = Object.fromEntries(s.members.map(m => [m.id, m]));\n    const av = (ids) => (ids || []).map(id => memberMap[id]).filter(Boolean).map(m => ({ initials: m.initials, color: m.color, name: m.name }));\n    const activeWs = s.workspaces.find(w => w.id === s.activeWs) || s.workspaces[0];\n    const activeBoard = s.boards.find(b => b.id === s.activeBoard) || s.boards[0];\n    const dt = s.dragTarget;\n\n    const cardBase = 'background:var(--surface); border:1px solid var(--border); border-radius:11px; padding:11px 12px; margin-bottom:8px; cursor:pointer; box-shadow:var(--shadow); transition:border-color .1s ease;';\n\n    const viewLists = s.lists.map(list => ({\n      id: list.id,\n      title: list.title,\n      count: list.cards.length,\n      dropAtEnd: !!(dt && dt.listId === list.id && dt.cardId === null),\n      composerOpen: s.composerListId === list.id,\n      composerClosed: s.composerListId !== list.id,\n      openComposer: () => this.openComposer(list.id),\n      onDragOver: (e) => this.listDragOver(e, list.id),\n      onDrop: (e) => this.listDrop(e, list.id),\n      cards: list.cards.map(card => {\n        const done = card.checklist.filter(i => i.done).length;\n        const total = card.checklist.length;\n        const dragging = s.dragCardId === card.id;\n        const hasDue = !!card.due, hasChecklist = total > 0, hasComments = card.comments.length > 0, hasAttach = card.attachments.length > 0, hasAssignees = card.assignees.length > 0;\n        return {\n          id: card.id,\n          title: card.title,\n          labels: card.labels,\n          hasLabels: card.labels.length > 0,\n          assignees: av(card.assignees),\n          hasAssignees,\n          hasMeta: hasDue || hasChecklist || hasComments || hasAttach || hasAssignees,\n          hasDue, dueLabel: card.due ? card.due.label : '',\n          dueStyle: 'display:flex; align-items:center; gap:3px; font-size:12px; font-weight:600; padding:2px 7px; border-radius:6px; ' + (card.due && card.due.soon ? 'background:var(--danger-soft); color:var(--danger);' : 'background:var(--surface-2); color:var(--text-2);'),\n          hasChecklist, checkLabel: done + '/' + total,\n          checkStyle: 'display:flex; align-items:center; gap:3px; font-size:12px; font-weight:600; ' + (total > 0 && done === total ? 'color:#0f9d58;' : 'color:var(--text-3);'),\n          hasComments, comments: card.comments.length,\n          hasAttach, attach: card.attachments.length,\n          style: cardBase + (dragging ? 'opacity:0.35;' : ''),\n          dropBefore: !!(dt && dt.listId === list.id && dt.cardId === card.id && dt.before),\n          onDragStart: (e) => this.cardDragStart(e, card.id),\n          onDragOver: (e) => this.cardDragOver(e, card.id, list.id),\n          onDragEnd: this.cardDragEnd,\n          onClick: () => this.openCard(card.id),\n        };\n      }),\n    }));\n\n    // modal\n    let modal = null;\n    if (s.openCardId) {\n      for (const l of s.lists) {\n        const c = l.cards.find(x => x.id === s.openCardId);\n        if (c) {\n          const done = c.checklist.filter(i => i.done).length, total = c.checklist.length;\n          const pct = total ? Math.round((done / total) * 100) : 0;\n          modal = {\n            title: c.title,\n            listName: l.title,\n            assignees: av(c.assignees),\n            labels: c.labels, hasLabels: c.labels.length > 0,\n            hasDue: !!c.due, dueLabel: c.due ? c.due.label : '',\n            dueStyle: 'display:inline-flex; align-items:center; gap:6px; font-size:13px; font-weight:600; padding:6px 12px; border-radius:8px; ' + (c.due && c.due.soon ? 'background:var(--danger-soft); color:var(--danger);' : 'background:var(--surface-2); color:var(--text-2);'),\n            description: c.description || 'No description yet.',\n            hasChecklist: total > 0, checkLabel: done + '/' + total, checkPct: pct + '%',\n            checklist: c.checklist.map(it => ({\n              text: it.text, done: it.done,\n              icon: it.done ? 'check_box' : 'check_box_outline_blank',\n              color: it.done ? 'var(--primary)' : 'var(--text-3)',\n              textStyle: 'font-size:14px; ' + (it.done ? 'color:var(--text-3); text-decoration:line-through;' : 'color:var(--text);'),\n
